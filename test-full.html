<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QR Generator Test (Full)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --bg: #0f172a;
        --card-bg: #1f2937;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --border: #374151;
        --text: #e5e7eb;
        --muted: #9ca3af;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: radial-gradient(circle at top, #1e293b, #020617 60%);
        color: var(--text);
      }

      .container {
        width: 100%;
        max-width: 960px;
        padding: 24px;
      }

      .card {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
        gap: 24px;
        padding: 24px;
        border-radius: 16px;
        background: linear-gradient(145deg, #020617, #020617) padding-box,
          linear-gradient(145deg, #3b82f6, #a855f7) border-box;
        border: 1px solid transparent;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
      }

      @media (max-width: 768px) {
        .card {
          grid-template-columns: 1fr;
        }
      }

      h1 {
        margin: 0 0 4px;
        font-size: 1.75rem;
      }

      .subtitle {
        margin: 0 0 20px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      label {
        font-size: 0.85rem;
        color: var(--muted);
      }

      input[type="text"],
      input[type="number"],
      select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background-color: #020617;
        color: var(--text);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      }

      input[type="text"]:focus,
      input[type="number"]:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.4);
      }

      input[type="color"] {
        width: 56px;
        height: 32px;
        padding: 0;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #020617;
        cursor: pointer;
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .hint {
        font-size: 0.75rem;
        color: var(--muted);
      }

      button {
        margin-top: 4px;
        padding: 10px 14px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, var(--accent), #a855f7);
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.35);
        transition: transform 0.1s ease, box-shadow 0.1s ease,
          filter 0.15s ease;
      }

      button:hover {
        filter: brightness(1.05);
        box-shadow: 0 22px 45px rgba(59, 130, 246, 0.45);
      }

      button:active {
        transform: translateY(1px) scale(0.99);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.85);
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
        box-shadow: none;
      }

      .status {
        margin-top: 6px;
        font-size: 0.8rem;
        color: var(--muted);
        min-height: 1.1em;
      }

      .status.error {
        color: #fecaca;
      }

      .status.success {
        color: #bbf7d0;
      }

      .preview-panel {
        border-radius: 12px;
        background-color: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(55, 65, 81, 0.8);
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-align: center;
      }

      .preview-title {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .qr-wrapper {
        width: 260px;
        height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: radial-gradient(circle at top, #020617, #020617);
        border: 1px dashed #4b5563;
        overflow: hidden;
      }

      .qr-wrapper img {
        max-width: 100%;
        max-height: 100%;
        display: block;
      }

      .qr-placeholder {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .download-link {
        font-size: 0.85rem;
        text-decoration: none;
        color: #bfdbfe;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(59, 130, 246, 0.6);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(3px);
        transition: opacity 0.15s ease, transform 0.15s ease;
      }

      .download-link.visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div>
          <h1>QR Generator Test</h1>
          <p class="subtitle">
            Fill in the fields below to test your QR-code backend with all
            parameters.
          </p>

          <form id="qrForm">
            <div class="field">
              <label for="text">Text / URL *</label>
              <input
                type="text"
                id="text"
                name="text"
                placeholder="https://example.com or any text"
                required
              />
            </div>

            <div class="field">
              <label>Foreground color</label>
              <div class="color-row">
                <input
                  type="color"
                  id="foregroundColor"
                  name="foregroundColor"
                  value="#000000"
                />
                <span class="hint">Color of QR modules (dark)</span>
              </div>
            </div>

            <div class="field">
              <label>Background color</label>
              <div class="color-row">
                <input
                  type="color"
                  id="backgroundColor"
                  name="backgroundColor"
                  value="#ffffff"
                />
                <span class="hint">Background behind the QR code</span>
              </div>
            </div>

            <div class="field">
              <label for="size">Size (px)</label>
              <input
                type="number"
                id="size"
                name="size"
                min="100"
                max="1000"
                value="300"
              />
              <span class="hint">From 100 to 1000 pixels (default 300)</span>
            </div>

            <div class="field">
              <label for="ecl">Error correction</label>
              <select id="ecl" name="errorCorrectionLevel">
                <option value="L">L (Low, ~7%)</option>
                <option value="M" selected>M (Medium, ~15%)</option>
                <option value="Q">Q (Quartile, ~25%)</option>
                <option value="H">H (High, ~30%)</option>
              </select>
            </div>

            <button type="submit" id="submitBtn">
              Generate QR
              <span aria-hidden="true">↻</span>
            </button>

            <div id="status" class="status"></div>
          </form>
        </div>

        <div class="preview-panel">
          <div class="preview-title">Preview</div>
          <div class="qr-wrapper" id="qrWrapper">
            <div class="qr-placeholder">
              QR code will appear here after generation
            </div>
          </div>
          <a
            id="downloadLink"
            class="download-link"
            href="#"
            download="qr-code.png"
          >
            Download PNG
            <span aria-hidden="true">⬇</span>
          </a>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("qrForm");
      const statusEl = document.getElementById("status");
      const submitBtn = document.getElementById("submitBtn");
      const qrWrapper = document.getElementById("qrWrapper");
      const downloadLink = document.getElementById("downloadLink");

      const API_URL = "http://localhost:5000/api/generate-qr";

      function setStatus(message, type = "") {
        statusEl.textContent = message || "";
        statusEl.className = "status" + (type ? " " + type : "");
      }

      function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        submitBtn.textContent = isLoading ? "Generating..." : "Generate QR";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("", "");
        downloadLink.classList.remove("visible");

        const text = document.getElementById("text").value.trim();
        const sizeInput = document.getElementById("size").value;
        const foregroundColor = document.getElementById("foregroundColor").value;
        const backgroundColor = document.getElementById("backgroundColor").value;
        const errorCorrectionLevel = document.getElementById("ecl").value;

        if (!text) {
          setStatus("Text is required.", "error");
          return;
        }

        const payload = {
          text,
          foregroundColor,
          backgroundColor,
          errorCorrectionLevel,
        };

        if (sizeInput) {
          payload.size = Number(sizeInput);
        }

        try {
          setLoading(true);

          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            let errorMessage = `Request failed (${response.status})`;
            try {
              const data = await response.json();
              if (data && data.message) {
                errorMessage = data.message;
              }
            } catch (_) {
              // ignore JSON parse errors
            }
            throw new Error(errorMessage);
          }

          // Response is image/png buffer, get it as blob
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);

          // Render image inside preview
          const img = document.createElement("img");
          img.src = url;
          img.alt = "Generated QR code";

          // Clear previous content
          qrWrapper.innerHTML = "";
          qrWrapper.appendChild(img);

          // Configure download link
          downloadLink.href = url;
          downloadLink.classList.add("visible");

          setStatus("QR code generated successfully.", "success");
        } catch (error) {
          console.error("QR generation error:", error);
          setStatus(error.message || "Failed to generate QR code.", "error");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
