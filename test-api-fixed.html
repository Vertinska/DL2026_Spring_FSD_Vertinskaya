<!DOCTYPE html>
<html>
<head>
    <title>Тест QR Generator API</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        input, button, select { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; cursor: pointer; padding: 10px; }
        button:hover { background: #45a049; }
        img { max-width: 100%; margin-top: 20px; border: 1px solid #ddd; }
        .error { color: red; padding: 10px; background: #ffeeee; border-radius: 5px; }
        .success { color: green; padding: 10px; background: #eeffee; border-radius: 5px; }
        .info { background: #e7f3fe; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Генератор QR-кодов - Тест</h2>
    
    <div class="info" id="status">
        🔄 Проверка соединения с сервером...
    </div>
    
    <div>
        <label>Текст или URL:</label>
        <input type="text" id="text" value="https://example.com" placeholder="Введите текст или URL">
    </div>
    
    <div>
        <label>Размер (пиксели):</label>
        <input type="number" id="size" value="300" min="100" max="1000">
    </div>
    
    <div>
        <label>Цвет переднего плана:</label>
        <input type="color" id="fgColor" value="#000000">
    </div>
    
    <div>
        <label>Цвет фона:</label>
        <input type="color" id="bgColor" value="#FFFFFF">
    </div>
    
    <div>
        <label>Уровень коррекции:</label>
        <select id="errorLevel">
            <option value="L">L (7%)</option>
            <option value="M" selected>M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
        </select>
    </div>
    
    <button onclick="generateQR()">Сгенерировать QR</button>
    <button onclick="testConnection()" style="background: #008CBA;">Проверить соединение</button>
    
    <div id="result"></div>

    <script>
    // Проверяем соединение при загрузке страницы
    window.onload = function() {
        testConnection();
    };

    async function testConnection() {
        const status = document.getElementById('status');
        status.innerHTML = '🔄 Проверка соединения с сервером...';
        status.className = 'info';
        
        try {
            // Пробуем достучаться до сервера
            const response = await fetch('http://localhost:5000', {
                method: 'GET',
                mode: 'cors'
            });
            
            status.innerHTML = '✅ Сервер доступен! (готов к работе)';
            status.className = 'success';
            return true;
        } catch (err) {
            status.innerHTML = `❌ Сервер недоступен: ${err.message}. Убедитесь, что сервер запущен в папке backend командой "npm run dev"`;
            status.className = 'error';
            return false;
        }
    }

    async function generateQR() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '🔄 Генерация...';
        
        // Проверим соединение ещё раз
        const isConnected = await testConnection();
        if (!isConnected) {
            resultDiv.innerHTML = '<div class="error">❌ Нет соединения с сервером. Запустите сервер и попробуйте снова.</div>';
            return;
        }
        
        const data = {
            text: document.getElementById('text').value,
            size: parseInt(document.getElementById('size').value),
            foregroundColor: document.getElementById('fgColor').value,
            backgroundColor: document.getElementById('bgColor').value,
            errorCorrectionLevel: document.getElementById('errorLevel').value
        };
        
        // Проверка на пустой текст
        if (!data.text.trim()) {
            resultDiv.innerHTML = '<div class="error">❌ Введите текст или URL</div>';
            return;
        }
        
        console.log('Отправляем данные:', data);
        
        try {
            const response = await fetch('http://localhost:5000/api/generate-qr', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
            
            console.log('Статус ответа:', response.status);
            console.log('Заголовки:', response.headers);
            
            if (response.ok) {
                // Проверим, что пришло изображение
                const contentType = response.headers.get('content-type');
                console.log('Content-Type:', contentType);
                
                if (contentType && contentType.includes('image/png')) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    resultDiv.innerHTML = `
                        <div class="success">✅ QR-код успешно сгенерирован!</div>
                        <img src="${url}" alt="QR Code">
                        <p>
                            <a href="${url}" download="qrcode.png" style="display: inline-block; background: #008CBA; color: white; padding: 10px; text-decoration: none; margin-top: 10px;">
                                Скачать QR-код
                            </a>
                        </p>
                    `;
                } else {
                    // Если пришёл не PNG, покажем текст ошибки
                    const text = await response.text();
                    resultDiv.innerHTML = `<div class="error">❌ Сервер вернул не изображение: ${text}</div>`;
                }
            } else {
                const errorText = await response.text();
                resultDiv.innerHTML = `<div class="error">❌ Ошибка ${response.status}: ${errorText}</div>`;
            }
        } catch (err) {
            console.error('Ошибка:', err);
            resultDiv.innerHTML = `<div class="error">❌ Ошибка соединения: ${err.message}. Проверьте, запущен ли сервер на порту 5000</div>`;
        }
    }
    </script>
</body>
</html>
